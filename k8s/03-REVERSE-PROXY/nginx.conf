# ============================================================
# nginx - Reverse proxy para server privado (200.234.225.16)
# Proxea trafico hacia los NodePorts del cluster K8s en la Cato
# ============================================================

# HTTP -> HTTPS redirect (con excepcion para certbot renewal)
server {
    listen 80;
    server_name peru.lidera.kr peruadmin.lidera.kr;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# peru.lidera.kr -> Superior/Participante Frontend
server {
    listen 443 ssl http2;
    server_name peru.lidera.kr;

    ssl_certificate /etc/letsencrypt/live/peru.lidera.kr/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/peru.lidera.kr/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;

    # Proxy todo (incluye /graphql, assets, etc.) al NodePort del frontend
    location / {
        proxy_pass http://172.16.10.31:30007;
        proxy_http_version 1.1;

        # WebSocket support
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_buffering off;
        proxy_redirect off;
    }
}

# peruadmin.lidera.kr -> Admin Frontend
server {
    listen 443 ssl http2;
    server_name peruadmin.lidera.kr;

    ssl_certificate /etc/letsencrypt/live/peru.lidera.kr/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/peru.lidera.kr/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;

    location / {
        proxy_pass http://172.16.10.31:30006;
        proxy_http_version 1.1;

        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_buffering off;
        proxy_redirect off;
    }
}
